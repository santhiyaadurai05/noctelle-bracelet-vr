<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Noctella - Smart Safety Bracelet</title>

   
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }
    </style>
</head>

<body>

<a-scene
    background="color: black"
    vr-mode-ui="enabled: true"
    webxr="requiredFeatures: local-floor"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    cursor="rayOrigin: mouse">

  
    <a-entity camera look-controls wasd-controls position="0 1.6 0"></a-entity>

    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" position="0 5 3" intensity="0.8"></a-light>

    <a-text 
        value="NOCTELLA - Smart Safety Bracelet"
        position="0 5 -6"
        align="center"
        color="#FFC0CB"
        width="10"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt">
    </a-text>


    <a-entity 
        gltf-model="bracelet.glb"                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   
        position="0 1.6 -4"
        scale="0.6 0.6 0.6"
        animation="property: rotation;
                   to: 0 360 0;
                   loop: true;
                   dur: 15000;
                   easing: linear">
    </a-entity>

   
    <a-sphere id="sos"
              position="-0.8 1.9 -4"
              radius="0.08"
              color="#FF4C4C">
    </a-sphere>

    <a-sphere id="gps"
              position="0.9 2 -4"
              radius="0.08"
              color="#4CAFFF">
    </a-sphere>

    <a-sphere id="gsm"
              position="0 1.2 -4"
              radius="0.08"
              color="#00FF99">
    </a-sphere>

   
    <a-plane
        position="0 0.8 -6"
        width="5"
        height="1"
        color="#111111"
        opacity="0.9">
    </a-plane>

    <a-text 
        id="infoText"
        value="Click a sensor to explore features"
        position="0 0 -3.9"
        align="center"
        color="#FFC0CB"
        width="6"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt">
    </a-text>

</a-scene>

<script>
    const info = document.querySelector('#infoText');

    document.querySelector('#sos').addEventListener('click', function () {
        info.setAttribute('value', 'SOS Emergency Alert System Activated');
    });

    document.querySelector('#gps').addEventListener('click', function () {
        info.setAttribute('value', 'Real-Time GPS Tracking Enabled');
    });

    document.querySelector('#gsm').addEventListener('click', function () {
        info.setAttribute('value', 'GSM Communication Module Integrated');
    });
</script>

</body>
</html>
